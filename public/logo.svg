<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 背景渐变：深夜蓝到极光紫 -->
    <radialGradient id="bgGrad" cx="0.5" cy="0.4" r="0.65">
      <stop offset="0%" stop-color="#2b4f81"/>
      <stop offset="60%" stop-color="#1a2a6c"/>
      <stop offset="100%" stop-color="#0d1442"/>
    </radialGradient>

    <!-- 雪花主体渐变 -->
    <linearGradient id="flakeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#d6eeff"/>
      <stop offset="100%" stop-color="#a8d8ff"/>
    </linearGradient>

    <!-- 外发光滤镜 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur1"/>
      <feGaussianBlur stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 柔光滤镜 -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="url(#bgGrad)"/>

  <!-- 背景装饰：极淡的大圆环 -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="64" cy="64" r="36" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- 中心雪花组 -->
  <g transform="translate(64, 64)" filter="url(#glow)">
    <!-- 6条主臂 -->
    <g stroke="url(#flakeGrad)" stroke-width="2.5" stroke-linecap="round" fill="none">
      <!-- 垂直主臂 -->
      <line x1="0" y1="-36" x2="0" y2="36"/>
      <!-- 60度主臂 -->
      <line x1="-31.2" y1="-18" x2="31.2" y2="18"/>
      <line x1="-31.2" y1="18" x2="31.2" y2="-18"/>
    </g>

    <!-- 分支（每个主臂上有两层分支） -->
    <g stroke="url(#flakeGrad)" stroke-width="1.8" stroke-linecap="round" fill="none">
      <!-- 上层分支组（距离中心18px处） -->
      <!-- 上臂分支 -->
      <line x1="0" y1="-18" x2="9" y2="-24"/>
      <line x1="0" y1="-18" x2="-9" y2="-24"/>
      <!-- 下臂分支 -->
      <line x1="0" y1="18" x2="9" y2="24"/>
      <line x1="0" y1="18" x2="-9" y2="24"/>
      <!-- 右上臂分支 -->
      <line x1="15.6" y1="-9" x2="22.5" y2="-15"/>
      <line x1="15.6" y1="-9" x2="22.5" y2="-3"/>
      <!-- 左下臂分支 -->
      <line x1="-15.6" y1="9" x2="-22.5" y2="15"/>
      <line x1="-15.6" y1="9" x2="-22.5" y2="3"/>
      <!-- 右下臂分支 -->
      <line x1="15.6" y1="9" x2="22.5" y2="15"/>
      <line x1="15.6" y1="9" x2="22.5" y2="3"/>
      <!-- 左上臂分支 -->
      <line x1="-15.6" y1="-9" x2="-22.5" y2="-15"/>
      <line x1="-15.6" y1="-9" x2="-22.5" y2="-3"/>
    </g>

    <!-- 更外层小分支（距离中心28px处） -->
    <g stroke="url(#flakeGrad)" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.85">
      <line x1="0" y1="-28" x2="5" y2="-31"/>
      <line x1="0" y1="-28" x2="-5" y2="-31"/>
      <line x1="0" y1="28" x2="5" y2="31"/>
      <line x1="0" y1="28" x2="-5" y2="31"/>
      <line x1="24.2" y1="-14" x2="28.5" y2="-16.5"/>
      <line x1="24.2" y1="-14" x2="26" y2="-10.5"/>
      <line x1="-24.2" y1="14" x2="-28.5" y2="16.5"/>
      <line x1="-24.2" y1="14" x2="-26" y2="10.5"/>
      <line x1="24.2" y1="14" x2="28.5" y2="16.5"/>
      <line x1="24.2" y1="14" x2="26" y2="10.5"/>
      <line x1="-24.2" y1="-14" x2="-28.5" y2="-16.5"/>
      <line x1="-24.2" y1="-14" x2="-26" y2="-10.5"/>
    </g>

    <!-- 中心核心 -->
    <circle cx="0" cy="0" r="5" fill="url(#flakeGrad)" opacity="0.95"/>
    <circle cx="0" cy="0" r="2.5" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- 飘落的小雪花装饰 -->
  <g filter="url(#softGlow)">
    <!-- 左下区域 -->
    <g transform="translate(22, 96)" opacity="0.7">
      <line x1="0" y1="-3" x2="0" y2="3" stroke="#d6eeff" stroke-width="1" stroke-linecap="round"/>
      <line x1="-2.6" y1="-1.5" x2="2.6" y2="1.5" stroke="#d6eeff" stroke-width="1" stroke-linecap="round"/>
      <line x1="-2.6" y1="1.5" x2="2.6" y2="-1.5" stroke="#d6eeff" stroke-width="1" stroke-linecap="round"/>
    </g>

    <!-- 右下区域 -->
    <g transform="translate(100, 104)" opacity="0.5">
      <line x1="0" y1="-2.5" x2="0" y2="2.5" stroke="#d6eeff" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="-2.2" y1="-1.3" x2="2.2" y2="1.3" stroke="#d6eeff" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="-2.2" y1="1.3" x2="2.2" y2="-1.3" stroke="#d6eeff" stroke-width="0.8" stroke-linecap="round"/>
    </g>

    <!-- 底部小圆点 -->
    <circle cx="42" cy="108" r="1.8" fill="#a8d8ff" opacity="0.5"/>
    <circle cx="76" cy="114" r="1.3" fill="#d6eeff" opacity="0.4"/>
    <circle cx="58" cy="118" r="1.5" fill="#a8d8ff" opacity="0.35"/>
    <circle cx="110" cy="94" r="1.2" fill="#d6eeff" opacity="0.3"/>
    <circle cx="14" cy="102" r="1" fill="#d6eeff" opacity="0.4"/>
  </g>
</svg>
