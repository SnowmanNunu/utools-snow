<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a6c"/>
      <stop offset="50%" stop-color="#3a6186"/>
      <stop offset="100%" stop-color="#6dd5fa"/>
    </linearGradient>
    <linearGradient id="flake" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="128" height="128" rx="12" fill="url(#bg)"/>
  <!-- Snowflake -->
  <g transform="translate(64,64)" filter="url(#glow)">
    <!-- Main 6 arms -->
    <g stroke="url(#flake)" stroke-width="3" stroke-linecap="round" fill="none">
      <!-- Vertical -->
      <line x1="0" y1="-40" x2="0" y2="40"/>
      <!-- Diagonal 60° -->
      <line x1="-34.6" y1="-20" x2="34.6" y2="20"/>
      <line x1="-34.6" y1="20" x2="34.6" y2="-20"/>
      <!-- Branch lines on each arm -->
      <!-- Top arm -->
      <line x1="0" y1="-30" x2="10" y2="-24"/>
      <line x1="0" y1="-30" x2="-10" y2="-24"/>
      <line x1="0" y1="-20" x2="10" y2="-14"/>
      <line x1="0" y1="-20" x2="-10" y2="-14"/>
      <!-- Bottom arm -->
      <line x1="0" y1="30" x2="10" y2="24"/>
      <line x1="0" y1="30" x2="-10" y2="24"/>
      <line x1="0" y1="20" x2="10" y2="14"/>
      <line x1="0" y1="20" x2="-10" y2="14"/>
      <!-- Top-right arm -->
      <line x1="26" y1="-15" x2="32" y2="-5"/>
      <line x1="26" y1="-15" x2="22" y2="-26"/>
      <line x1="17.3" y1="-10" x2="23.3" y2="0"/>
      <line x1="17.3" y1="-10" x2="12" y2="-21"/>
      <!-- Bottom-left arm -->
      <line x1="-26" y1="15" x2="-32" y2="5"/>
      <line x1="-26" y1="15" x2="-22" y2="26"/>
      <line x1="-17.3" y1="10" x2="-23.3" y2="0"/>
      <line x1="-17.3" y1="10" x2="-12" y2="21"/>
      <!-- Bottom-right arm -->
      <line x1="26" y1="15" x2="32" y2="5"/>
      <line x1="26" y1="15" x2="22" y2="26"/>
      <line x1="17.3" y1="10" x2="23.3" y2="0"/>
      <line x1="17.3" y1="10" x2="12" y2="21"/>
      <!-- Top-left arm -->
      <line x1="-26" y1="-15" x2="-32" y2="-5"/>
      <line x1="-26" y1="-15" x2="-22" y2="-26"/>
      <line x1="-17.3" y1="-10" x2="-23.3" y2="0"/>
      <line x1="-17.3" y1="-10" x2="-12" y2="-21"/>
    </g>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="5" fill="url(#flake)" opacity="0.9"/>
  </g>
  <!-- Small dots representing falling snow -->
  <circle cx="28" cy="95" r="2" fill="white" opacity="0.6"/>
  <circle cx="95" cy="100" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="45" cy="110" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="80" cy="115" r="2" fill="white" opacity="0.5"/>
  <circle cx="105" cy="110" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="15" cy="105" r="1.5" fill="white" opacity="0.4"/>
</svg>
